name: livehard_app
description: "Accountability tracker for the 75 Hard & Live Hard program (4 phases)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ---- State management (Riverpod + code generation) ----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---- Local database (sembast: documental y reactiva, corre en io y web) ----
  sembast: ^3.8.9
  sembast_web: ^2.4.5           # backend IndexedDB para Flutter Web

  # ---- Filesystem (rutas para guardar la foto de progreso) ----
  path_provider: ^2.1.3
  path: ^1.9.0

  # ---- Captura de la foto diaria ----
  image_picker: ^1.1.2

  # ---- Utilidades ----
  intl: ^0.19.0                 # formato/comparación de fechas
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ---- Code generators (solo providers de Riverpod; los modelos ya no usan codegen) ----
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  # custom_lint / riverpod_lint: siguen desactivados. El conflicto original
  # (isar_generator exigía analyzer <6) ya no existe; reactivarlos es un
  # follow-up aparte porque arrastra saltos de analyzer/lints con ruido propio.
  # custom_lint: ^0.6.4
  # riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
