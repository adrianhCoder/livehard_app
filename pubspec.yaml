name: livehard_app
description: "Accountability tracker for the 75 Hard & Live Hard program (4 phases)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ---- State management (Riverpod + code generation) ----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---- Local database (Isar: índices nativos sobre DateTime) ----
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1   # binarios nativos en runtime

  # ---- Filesystem (rutas para guardar la foto de progreso) ----
  path_provider: ^2.1.3
  path: ^1.9.0

  # ---- Captura de la foto diaria ----
  image_picker: ^1.1.2

  # ---- Utilidades ----
  intl: ^0.19.0                 # formato/comparación de fechas
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ---- Code generators ----
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  # custom_lint / riverpod_lint: desactivados temporalmente — su `analyzer`
  # nuevo choca con el `analyzer` viejo que exige isar_generator 3.x.
  # No son necesarios para ejecutar la app.
  # custom_lint: ^0.6.4
  # riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
